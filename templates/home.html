<!DOCTYPE html>
<html>

<head>
    <title>Student Performance Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script>

        function showLoader() {
            document.getElementById("loader").style.display = "block";
        }

        function toggleMode() {
            document.body.classList.toggle("dark");
        }

    </script>

</head>

<body>

    <div class="container">

        <h1>🎓 Student Performance Predictor</h1>

        <button class="dark-btn" onclick="toggleMode()">🌙 Dark Mode</button>

        <form action="{{ url_for('predict_datapoint') }}" method="post" onsubmit="showLoader()">

            <label>Gender</label>
            <select name="gender">
                <option value="male"
                    {% if form_data and form_data.gender=='male' %}selected{% endif %}>
                    Male
                </option>

                <option value="female"
                    {% if form_data and form_data.gender=='female' %}selected{% endif %}>
                    Female
                </option>
            </select>


            <label>Race / Ethnicity</label>
            <select name="ethnicity">

                <option value="group A"
                    {% if form_data and form_data.ethnicity=='group A' %}selected{% endif %}>
                    Group A
                </option>

                <option value="group B"
                    {% if form_data and form_data.ethnicity=='group B' %}selected{% endif %}>
                    Group B
                </option>

                <option value="group C"
                    {% if form_data and form_data.ethnicity=='group C' %}selected{% endif %}>
                    Group C
                </option>

                <option value="group D"
                    {% if form_data and form_data.ethnicity=='group D' %}selected{% endif %}>
                    Group D
                </option>

                <option value="group E"
                    {% if form_data and form_data.ethnicity=='group E' %}selected{% endif %}>
                    Group E
                </option>

            </select>


            <label>Parental Education</label>
            <select name="parental_level_of_education">

                <option value="bachelor's degree">Bachelor</option>
                <option value="master's degree">Master</option>
                <option value="high school">High School</option>
                <option value="associate's degree">Associate</option>

            </select>


            <label>Lunch Type</label>
            <select name="lunch">

                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>

            </select>


            <label>Test Preparation</label>
            <select name="test_preparation_course">

                <option value="none">None</option>
                <option value="completed">Completed</option>

            </select>


            <label>Reading Score</label>
            <input
                type="number"
                name="reading_score"
                min="0"
                max="100"
                value="{{ form_data.reading_score if form_data else '' }}"
            >


            <label>Writing Score</label>
            <input
                type="number"
                name="writing_score"
                min="0"
                max="100"
                value="{{ form_data.writing_score if form_data else '' }}"
            >


            <button type="submit">
                Predict Maths Score
            </button>

        </form>


        <div id="loader" class="loader"></div>


        {% if results %}

        <div class="result">
            ✨ Predicted Maths Score : {{ results }}
        </div>

        <canvas id="chart"></canvas>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <script>

            const ctx = document.getElementById('chart')

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ["Predicted Maths Score"],
                    datasets: [{
                        label: "Score",
                        data: [{{ results }}],
                        backgroundColor: "#4facfe"
                    }
                }
            } )

        </script>

        {% endif %}

    </div>

</body>

</html>
